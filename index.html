  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #4b96a2 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Partículas flotantes de fondo */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(100px) rotate(360deg);
        opacity: 0;
      }
    }

    .contenedor {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 1;
      position: relative;
    }

    h1 {
      color: white;
      font-size: 3em;
      text-align: center;
      margin: 20px 0;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      font-weight: 700;
      letter-spacing: 2px;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .socializer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
    }

    .myButton {
      background: linear-gradient(135deg, #2681df 0%, #3ebbd7 100%);
      border: none;
      border-radius: 50px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 30px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
      transition: all 0.3s ease;
      display: inline-block;
      margin: 10px 0;
    }

    .myButton:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(245, 87, 108, 0.6);
    }

    .myButton:active {
      transform: translateY(-1px);
    }

    .puntaje {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      border-radius: 50px;
      color: white;
      font-size: 1.3em;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      min-width: 150px;
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .encabezado {
      position: relative;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      width: 100%;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.5);
      animation: slideUp 0.6s ease-out;
      overflow: hidden;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .encabezado::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 300% 100%;
      animation: gradientMove 3s ease infinite;
    }

    @keyframes gradientMove {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .categoria {
      color: #667eea;
      font-size: 0.9em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      opacity: 0.8;
    }

    .pregunta {
      font-size: 2.5em;
      font-weight: 700;
      color: #2d3748;
      margin: 20px 0;
      text-align: center;
      animation: pulse 0.5s ease-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0;
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .numero {
      position: absolute;
      top: 15px;
      right: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1em;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .imagen {
      object-fit: cover;
      width: 0;
      height: 0;
      border-radius: 15px;
      transition: all 0.5s ease;
    }

    .btn-container {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn {
      background: white;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: 500;
      color: #2d3748;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(102, 126, 234, 0.1);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      border-color: #667eea;
    }

    .btn:active {
      transform: translateY(-2px);
    }

    .btn.correct {
      background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
      color: white;
      border-color: #84fab0;
      animation: correctAnswer 0.6s ease;
    }

    @keyframes correctAnswer {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    .btn.incorrect {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: white;
      border-color: #fa709a;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-10px);
      }
      75% {
        transform: translateX(10px);
      }
    }

    footer {
      margin-top: 40px;
      text-align: center;
      z-index: 1;
    }

    footer .socializer {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    footer img {
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
    }

    footer img:hover {
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2em;
      }

      .pregunta {
        font-size: 1.8em;
      }

      .btn {
        padding: 15px;
        font-size: 1em;
      }
    }
	  a {
    text-decoration: none;
